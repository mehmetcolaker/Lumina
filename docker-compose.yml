version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumina-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: lumina
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumina-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumina-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:changeme@postgres:5432/lumina
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "${SECRET_KEY:-super-secret-key-change-in-production}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_ID: "${STRIPE_PRICE_ID:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumina-celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:changeme@postgres:5432/lumina
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: "${SECRET_KEY:-super-secret-key-change-in-production}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.modules.execution.tasks.celery_app worker --loglevel=info --pool=solo

volumes:
  pgdata:
